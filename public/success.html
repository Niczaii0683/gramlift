<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — GramLift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Sora:wght@800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#fafaf9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:white;border-radius:20px;padding:48px 40px;text-align:center;max-width:480px;width:100%;border:1px solid #e5e7eb;box-shadow:0 8px 40px rgba(0,0,0,.08);}
  h1{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:#111827;margin:16px 0 10px;}
  p{font-size:15px;color:#6b7280;line-height:1.65;margin-bottom:16px;}
  .detail-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin:20px 0;text-align:left;}
  .detail-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:5px 0;color:#6b7280;border-bottom:1px solid #f3f4f6;}
  .detail-row:last-child{border-bottom:none;}
  .detail-row span:last-child{font-weight:700;color:#111827;}
  .badge{background:#f0fdf4;border:1px solid #86efac;color:#15803d;border-radius:10px;padding:12px 16px;font-size:14px;font-weight:600;margin-bottom:20px;display:block;}
  .home-btn{display:inline-block;padding:13px 30px;background:linear-gradient(135deg,#dc2626,#ea580c,#f59e0b);color:white;border-radius:10px;font-weight:700;font-size:15px;text-decoration:none;}
  .home-btn:hover{opacity:.88;}
  .spin{display:inline-block;width:22px;height:22px;border:3px solid #fed7aa;border-top-color:#ea580c;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;display:block;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:left;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spin"></div>
  <h1>Confirming payment...</h1>
  <p>Please don't close this page. We're verifying your payment with Stripe.</p>
</div>
<script>
// Stripe redirects back to: /success.html?session_id=cs_test_XXXXX
// We don't need to call any API — the webhook already handled fulfilment.
// We just show a confirmation page.

function showSuccess() {
  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get("session_id") || "";
  const shortRef  = sessionId.slice(-8).toUpperCase();

  document.getElementById("card").innerHTML = `
    <div style="font-size:64px;margin-bottom:12px">🎉</div>
    <h1>Payment Confirmed!</h1>
    <p>Thank you! Your order has been placed and followers will start arriving on your Instagram within 1–3 business days.</p>
    <div class="detail-box">
      <div class="detail-row"><span>Status</span><span style="color:#15803d">✅ Paid</span></div>
      <div class="detail-row"><span>Order reference</span><span>GL-${shortRef}</span></div>
      <div class="detail-row"><span>Delivery</span><span>1–3 business days</span></div>
      <div class="detail-row"><span>Guarantee</span><span>90-day refill</span></div>
    </div>
    <div class="badge">✅ Your order is being processed automatically.</div>
    <a class="home-btn" href="/">Back to Dashboard</a>
    <p style="margin-top:16px;font-size:12px;color:#9ca3af">Check your email for a receipt from Stripe.</p>
  `;
}

// Small delay so it feels like something happened
setTimeout(showSuccess, 1200);
</script>
</body>
</html>
