<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cancelled — GramLift</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Sora:wght@800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#fafaf9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:white;border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;width:100%;border:1px solid #e5e7eb;}
  h1{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#111827;margin:16px 0 10px;}
  p{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6;}
  a{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#dc2626,#ea580c,#f59e0b);color:white;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:56px">↩️</div>
  <h1>Payment Cancelled</h1>
  <p>No charge was made. You can go back and try again whenever you're ready.</p>
  <a href="/">Back to Dashboard</a>
</div>
</body>
</html>
