<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GramLift — Instagram Growth Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --grad:linear-gradient(135deg,#dc2626,#ea580c,#f59e0b);
  --primary:#c2410c;--bg:#fafaf9;--surface:#fff;--border:#e5e7eb;
  --text:#111827;--muted:#6b7280;--subtle:#9ca3af;--r:12px;--r-lg:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* NAV */
.gnav{position:sticky;top:0;z-index:200;background:white;border-bottom:1px solid var(--border);height:62px;display:flex;align-items:center;padding:0 24px;gap:14px;}
.logo{font-family:'Sora',sans-serif;font-weight:800;font-size:19px;white-space:nowrap;}
.logo span{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sw{display:flex;align-items:center;flex:1;max-width:400px;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:white;}
.sw:focus-within{border-color:#ea580c;box-shadow:0 0 0 3px rgba(234,88,12,.08);}
.sw input{flex:1;border:none;outline:none;padding:9px 12px;font-size:13px;font-family:inherit;}
.sbtn{padding:8px 14px;background:var(--grad);border:none;color:white;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.sbtn:hover{opacity:.88;}
.nlnks{display:flex;gap:4px;margin-left:auto;align-items:center;}
.nlnk{background:none;border:none;padding:8px 11px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;font-family:inherit;border-radius:7px;}
.nlnk:hover{color:var(--text);background:#f3f4f6;}
.nghost{background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
.nghost:hover{background:#f9fafb;}
.nprim{background:var(--grad);border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;color:white;cursor:pointer;font-family:inherit;}
.nprim:hover{opacity:.88;}
.sprev{position:absolute;top:calc(100% + 6px);left:0;right:0;background:white;border:1px solid var(--border);border-radius:11px;padding:14px;box-shadow:0 8px 32px rgba(0,0,0,.10);z-index:500;min-width:300px;}
.spav{width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0;}

/* LAYOUT */
.shell{display:flex;min-height:calc(100vh - 62px);}
.sidebar{width:205px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:62px;height:calc(100vh - 62px);overflow-y:auto;}
.nvsec{padding:10px 8px 4px;}
.nvlbl{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;padding:8px 10px 4px;display:block;}
.nvi{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:none;border-radius:9px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:left;font-family:inherit;transition:all .15s;margin-bottom:1px;}
.nvi:hover{background:#f3f4f6;color:var(--text);}
.nvi.active{background:#fff7ed;color:#c2410c;font-weight:600;}
.uftr{padding:12px;border-top:1px solid var(--border);margin-top:auto;}
.avc{width:30px;height:30px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;flex-shrink:0;}
.lout{margin-top:9px;width:100%;padding:6px;border:1px solid var(--border);background:transparent;border-radius:7px;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;}
.lout:hover{background:#f3f4f6;}
.main{flex:1;padding:26px 28px;overflow-y:auto;}
.ptitle{font-family:'Sora',sans-serif;font-weight:800;font-size:21px;margin-bottom:3px;}
.psub{color:var(--muted);font-size:13px;margin-bottom:20px;}

/* STATS */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:18px;}
.sc{background:white;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.sc.pr{background:var(--grad);border:none;color:white;}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.65;margin-bottom:5px;}
.sval{font-family:'Sora',sans-serif;font-weight:800;font-size:24px;letter-spacing:-.02em;}
.topupm{margin-top:10px;padding:5px 10px;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);border-radius:7px;font-size:11px;font-weight:600;color:white;cursor:pointer;font-family:inherit;}

/* BOOST GRID */
.bgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:900px){.bgrid{grid-template-columns:repeat(4,1fr);}}
@media(max-width:680px){.bgrid{grid-template-columns:repeat(3,1fr);}}
.pkg{background:white;border:1.5px solid var(--border);border-radius:11px;padding:16px 10px;cursor:pointer;text-align:center;transition:all .17s;position:relative;user-select:none;}
.pkg:hover{border-color:#fb923c;transform:translateY(-2px);box-shadow:0 6px 20px rgba(234,88,12,.10);}
.pkg.sel{border-color:#ea580c;background:#fff7ed;box-shadow:0 0 0 3px rgba(234,88,12,.11);}
.pqty{font-family:'Sora',sans-serif;font-weight:800;font-size:18px;}
.plbl{font-size:11px;color:var(--muted);margin-bottom:9px;}
.ppr{font-size:15px;font-weight:700;color:#c2410c;}
.porig{font-size:10px;color:var(--subtle);text-decoration:line-through;height:13px;margin-bottom:2px;}
.dbadge{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--grad);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}

/* HANDLE PANEL */
.hp{background:white;border:1.5px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:14px;}
.hp-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.hp-price{font-size:20px;font-weight:800;color:#c2410c;font-family:'Sora',sans-serif;}
.uinput{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;font-size:14px;font-family:inherit;color:var(--text);outline:none;transition:border-color .18s;margin-bottom:6px;}
.uinput:focus{border-color:#ea580c;box-shadow:0 0 0 3px rgba(234,88,12,.08);}
.uinput.err{border-color:#dc2626;}
.errtxt{font-size:11px;color:#dc2626;margin-bottom:8px;}
.chips{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.chip{font-size:11px;color:var(--muted);}

/* ORDERS */
.olist{display:flex;flex-direction:column;gap:7px;}
.orow{background:white;border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.oicon{width:34px;height:34px;border-radius:8px;background:#fff7ed;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.badge{border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700;text-transform:uppercase;}
.badge.fulfilled{background:#f0fdf4;color:#15803d;}
.badge.pending{background:#fffbeb;color:#b45309;}
.badge.failed{background:#fef2f2;color:#b91c1c;}
.badge.processing{background:#eff6ff;color:#1d4ed8;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.46);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal{background:white;border-radius:18px;padding:24px 26px;width:100%;max-width:430px;animation:pop .2s ease;max-height:90vh;overflow-y:auto;}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.mh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.mcls{background:#f3f4f6;border:none;border-radius:7px;width:32px;height:32px;font-size:17px;cursor:pointer;color:var(--muted);flex-shrink:0;}
.sumbox{background:#fafaf9;border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:13px;}
.sr{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted);}
.sr span:last-child{color:var(--text);font-weight:500;}
.sr.total{border-top:1px solid var(--border);margin-top:7px;padding-top:9px;font-weight:700;font-size:14px;color:var(--text);}
.sr.total span:last-child{color:#c2410c;}
.fl{margin-bottom:12px;}
.fl label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--subtle);margin-bottom:4px;}
.fl input{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .18s;}
.fl input:focus{border-color:#ea580c;}
.fl input.ferr{border-color:#dc2626;}

/* PAYMENT OPTIONS */
.pmethods{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.popt{padding:12px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .15s;background:white;}
.popt:hover{border-color:#fb923c;}
.popt.sel{border-color:#ea580c;background:#fff7ed;}
.plgo{font-size:20px;margin-bottom:3px;}
.pnm{font-weight:700;font-size:12px;}
.psub{font-size:10px;color:var(--subtle);margin-top:2px;}
.pcards{display:flex;justify-content:center;gap:3px;margin-top:5px;flex-wrap:wrap;}
.pcb{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;color:white;}
.pcb.visa{background:#1a1f71;}
.pcb.mc{background:#eb001b;}
.pcb.amex{background:#007bc1;}
.pcb.pp{background:#003087;}

/* BUTTONS */
.ctabtn{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--grad);color:white;transition:opacity .15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.ctabtn:hover{opacity:.88;}
.ctabtn:disabled{opacity:.4;cursor:not-allowed;}
.ctabtn.ghost{background:white;color:#c2410c;border:1.5px solid #fed7aa;}
.ctabtn.ghost:hover{background:#fff7ed;opacity:1;}

/* TOPUP */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.tamtbtn{padding:13px;border-radius:10px;border:1.5px solid var(--border);background:white;cursor:pointer;font-family:inherit;text-align:center;transition:all .15s;}
.tamtbtn.sel{border-color:#ea580c;background:#fff7ed;}
.tamtval{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;}
.tamtbtn.sel .tamtval{color:#c2410c;}

/* TIPBOX */
.tip{background:#fff7ed;border:1px solid #fed7aa;border-radius:9px;padding:9px 12px;font-size:12px;color:#92400e;margin-bottom:12px;}
.tip.green{background:#f0fdf4;border-color:#86efac;color:#15803d;}
.tip.blue{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;}

/* PLANS */
.plgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;}
.plcard{background:white;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:22px;position:relative;transition:all .2s;}
.plcard:hover{border-color:#fb923c;transform:translateY(-2px);box-shadow:0 8px 28px rgba(234,88,12,.09);}
.plcard.pop{border-color:#ea580c;box-shadow:0 4px 20px rgba(234,88,12,.13);}
.popbadge{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--grad);color:white;font-size:10px;font-weight:700;padding:2px 12px;border-radius:20px;white-space:nowrap;}

/* CHARTS */
.charts2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.chtcard{background:white;border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;}
.ctabs{display:flex;gap:2px;background:#f3f4f6;border-radius:7px;padding:2px;}
.ctab{flex:1;padding:5px 10px;border:none;background:transparent;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
.ctab.active{background:white;color:#c2410c;box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* IG PROFILE */
.igbanner{background:linear-gradient(135deg,#fff7ed,#fef3c7);border:1px solid #fed7aa;border-radius:var(--r-lg);padding:18px 22px;margin-bottom:18px;}
.igav{width:52px;height:52px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:20px;flex-shrink:0;}
.igsts{display:flex;gap:0;flex:1;}
.igst{flex:1;text-align:center;padding:0 14px;border-right:1px solid #fed7aa;}
.igst:last-child{border-right:none;}
.igstv{font-family:'Sora',sans-serif;font-weight:800;font-size:19px;color:#c2410c;}
.igstl{font-size:11px;color:var(--muted);margin-top:1px;}
.eleg{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.eli{display:flex;align-items:center;gap:7px;font-size:11px;}
.eld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cmrow{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.cm{font-size:11px;color:var(--muted);}
.cm strong{display:block;font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:var(--text);}

/* SETTINGS */
.setcard{background:white;border:1px solid var(--border);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:12px;}
.setcard h3{font-size:14px;font-weight:700;margin-bottom:13px;}
.savebtn{padding:9px 20px;background:var(--grad);color:white;border:none;border-radius:9px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;}

/* SPINNER / TOAST / STEPS */
.spin{width:15px;height:15px;border:2px solid #fed7aa;border-top-color:#ea580c;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:22px;right:22px;background:#111827;color:white;border-radius:11px;padding:11px 16px;font-size:13px;font-weight:500;z-index:9999;max-width:300px;animation:pop .25s ease;}
.steps{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;background:white;}
.step{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:600;color:var(--subtle);}
.step.done{color:#15803d;background:#f0fdf4;}
.step.active{color:#c2410c;background:#fff7ed;}
.stepn{display:block;font-family:'Sora',sans-serif;font-weight:800;font-size:15px;margin-bottom:1px;}

/* LOGIN */
.lwrap{min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.lnav{background:white;border-bottom:1px solid var(--border);height:58px;display:flex;align-items:center;padding:0 24px;}
.lctr{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.lcard{background:white;border:1px solid var(--border);border-radius:18px;padding:28px 24px;width:100%;max-width:380px;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;}
.ltab{flex:1;background:none;border:none;padding:10px 0;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--subtle);border-bottom:2px solid transparent;}
.ltab.active{color:#c2410c;border-bottom-color:#c2410c;}
.subbtn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--grad);color:white;margin-bottom:12px;}
.gbtn{width:100%;padding:10px;border:1.5px solid var(--border);background:white;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
.gbtn:hover{background:#f9fafb;}

.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){.sidebar{display:none;}.main{padding:14px;}.charts2{grid-template-columns:1fr;}.srow{grid-template-columns:1fr 1fr;}}
</style>
</head>

<div id="root"></div>
<script>
// ─── CONFIG — point to your backend ──────────────────────────────────────────
// When running locally: http://localhost:3001
// When deployed: https://your-backend.vercel.app
const API_BASE = "";  // Same origin — backend serves this file

// ─── DATA ────────────────────────────────────────────────────────────────────
const MOCK_USER={email:"founder@gramlift.com",instagram_handle:"nicc_yeo",credit_balance:120.00};
const MOCK_ORDERS=[
  {id:"GL-88291",package_name:"5K Followers",quantity:5000,amount_paid:279.99,status:"fulfilled",created_at:"2025-06-01T10:22:00Z"},
  {id:"GL-77100",package_name:"1K Followers",quantity:1000,amount_paid:72.99,status:"fulfilled",created_at:"2025-05-10T09:00:00Z"},
];
const PACKAGES=[
  {qty:100,   price:8.99,  base:8.99,   disc:0},
  {qty:250,   price:20.40, base:21.47,  disc:5},
  {qty:500,   price:38.37, base:40.39,  disc:5},
  {qty:1000,  price:72.99, base:74.99,  disc:3},
  {qty:2000,  price:132.99,base:139.99, disc:5},
  {qty:5000,  price:279.99,base:299.99, disc:7},
  {qty:10000, price:485.99,base:539.99, disc:10},
  {qty:20000, price:866.99,base:1019.99,disc:15},
  {qty:50000, price:1919.99,base:2399.99,disc:20},
  {qty:100000,price:3374.99,base:4499.99,disc:25},
];
const PLANS=[
  {id:"starter",name:"Starter",price:19,popular:false,desc:"500 followers/mo",features:["500 real followers / month","Audience targeting","Basic analytics","Email support"]},
  {id:"creator",name:"Creator",price:49,popular:true, desc:"1,500 followers/mo",features:["1,500 real followers / month","Advanced targeting","Priority growth","Live analytics","Chat support"]},
  {id:"pro",    name:"Pro",    price:99,popular:false,desc:"4,000 followers/mo",features:["4,000 real followers / month","Elite targeting","Account manager","Full analytics","24/7 support"]},
];
const TOPUP=[19,49,99,200];
const fmt=n=>"$"+Number(n).toFixed(2);
const fmtK=n=>n>=1000?(n/1000)+"K":""+n;
const fmtDate=s=>new Date(s).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
const fmtNum=n=>n>=1000000?(n/1000000).toFixed(1)+"M":n>=1000?(n/1000).toFixed(1)+"K":""+n;
const ICONS={100:"⚡",250:"⚡",500:"🔥",1000:"🔥",2000:"🔥",5000:"🚀",10000:"🚀",20000:"🚀",50000:"🚀",100000:"💫"};

// ─── STATE ────────────────────────────────────────────────────────────────────
let S={
  page:"login",ltab:"login",user:null,orders:[...MOCK_ORDERS],tab:"overview",
  selPkg:null,modal:null,topupAmt:49,toast:null,
  searchVal:"",searchResult:null,searchLoading:false,showPrev:false,
  viewedProfile:null,chartPeriod:"daily",
  buyStep:1,buyIg:"",buyIgErr:"",buyEmail:"",buyPayMethod:"stripe",buyLoading:false,
  selPlan:null,planStep:1,planIg:"",planIgErr:"",planEmail:"",planPay:"stripe",planLoading:false,
  settingsSaved:false,
};
function set(p){Object.assign(S,p);render();}
function toast(msg,delay=5000){set({toast:msg});setTimeout(()=>set({toast:null}),delay);}

// ─── MOCK IG ──────────────────────────────────────────────────────────────────
function mockIG(h){
  h=h.replace("@","").toLowerCase();
  const seed=h.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
  const f=800+((seed*137)%8000),fo=300+((seed*89)%2000),p=10+((seed*23)%300);
  return{handle:h,name:h[0].toUpperCase()+h.slice(1).replace(/_/g," "),
    followers:f,following:fo,posts:p,
    engagementSources:{organic:Math.round(f*.74),discover:Math.round(f*.14),search:Math.round(f*.07),dm:Math.round(f*.02),hashtags:Math.round(f*.05)},
    engagementTrend:[12,18,15,22,19,27,24].map(v=>Math.round(v*(seed%5+3))),
    totalEngagements:Math.round(f*.15),postViewsDay:Math.round(f*.09),profileViewsDay:Math.round(f*.09),reached:Math.round(f*.06),
  };
}

// ─── CHARTS ───────────────────────────────────────────────────────────────────
let _ch={};
function dc(id){if(_ch[id]){_ch[id].destroy();delete _ch[id];}}
function projGrowth(base,period){
  const n=period==="daily"?8:period==="weekly"?5:4;
  const labels=[],core=[],elite=[],none=[];
  const now=new Date();
  for(let i=0;i<n;i++){
    const d=new Date(now);
    if(period==="daily")d.setDate(d.getDate()+i);
    else if(period==="weekly")d.setDate(d.getDate()+i*7);
    else d.setMonth(d.getMonth()+i);
    labels.push(period==="daily"?d.toLocaleDateString("en-US",{month:"short",day:"numeric"}):period==="weekly"?"Wk "+(i+1):"Mo "+(i+1));
    const cm=period==="daily"?.05:period==="weekly"?.35:1.5,em=cm*1.9,nm=cm*.1;
    core.push(Math.round(base*(1+cm*i)));elite.push(Math.round(base*(1+em*i)));none.push(Math.round(base*(1+nm*i)));
  }
  return{labels,core,elite,none};
}
function initGC(p){dc("g");const c=document.getElementById("gChart");if(!c)return;const d=projGrowth(p.followers,S.chartPeriod);_ch.g=new Chart(c,{type:"line",data:{labels:d.labels,datasets:[{label:"Starter",data:d.core,borderColor:"#dc2626",backgroundColor:"rgba(220,38,38,.07)",pointBackgroundColor:"#dc2626",tension:.4,pointRadius:4,borderWidth:2.5},{label:"Pro",data:d.elite,borderColor:"#f59e0b",backgroundColor:"rgba(245,158,11,.05)",pointBackgroundColor:"#f59e0b",tension:.4,pointRadius:4,borderWidth:2.5},{label:"Without",data:d.none,borderColor:"#d1d5db",backgroundColor:"transparent",pointBackgroundColor:"#9ca3af",tension:.4,pointRadius:3,borderWidth:1.5,borderDash:[4,4]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(0,0,0,.03)"},ticks:{font:{size:10}}},y:{grid:{color:"rgba(0,0,0,.03)"},ticks:{font:{size:10},callback:v=>fmtNum(v)}}}}});}

// Calls backend -> gets Stripe URL -> redirects to Stripe payment page
async function submitBoostOrder(){
  const pkg=S.selPkg;
  set({buyLoading:true});
  try {
    const res = await fetch('/api/create-checkout', {
      method:  "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        type:              "boost",
        quantity:          pkg.qty,
        instagramUsername: S.buyIg,
        email:             S.buyEmail||undefined,
      }),
    });
    const data = await res.json();
    if(data.url){
      // Redirect to real Stripe hosted checkout page
      window.location.href = data.url;
    } else {
      alert("Error: " + (data.error||"Could not create checkout session. Is the backend running?"));
      set({buyLoading:false});
    }
  } catch(err) {
    alert("Cannot reach backend. Make sure your server is running at " + API_BASE);
    set({buyLoading:false});
  }
}

      ${plan.popular?`<div class="popbadge">★ Most Popular</div>`:""}

      <div style="font-family:'Sora',sans-serif;font-weight:800;font-size:30px;letter-spacing:-.02em;line-height:1">$${plan.price}</div>
      <div style="font-size:11px;color:var(--subtle);margin-bottom:14px">/month · ${plan.desc}</div>
      <ul style="list-style:none;margin-bottom:18px">
        ${plan.features.map(f=>`<li style="font-size:12px;color:#374151;display:flex;gap:6px;margin-bottom:7px"><span style="color:#ea580c">✓</span>${f}</li>`).join("")}
      </ul>
      <button onclick='openPlanCheckout(${JSON.stringify(plan)})'
        style="width:100%;padding:10px;border-radius:9px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;background:${plan.popular?"var(--grad)":"white"};color:${plan.popular?"white":"#c2410c"};border:${plan.popular?"none":"1.5px solid #fed7aa"}">
        Get Started →
      </button>
    </div>`).join("")}
  </div></div>`;
}
function openPlanCheckout(plan){set({selPlan:plan,planStep:1,planIg:"",planIgErr:"",planEmail:"",modal:"planchk"});}

// ─── PLAN CHECKOUT MODAL — calls real backend ─────────────────────────────────
function renderPlanModal(){
  const plan=S.selPlan;if(!plan)return"";
  return`<div class="overlay" onclick="if(event.target===this)set({modal:null})">
  <div class="modal">
    <div class="mh">
      <div><div style="font-size:10px;font-weight:700;color:#c2410c;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">${plan.name} Plan · $${plan.price}/mo</div>
      <div style="font-size:17px;font-weight:800;font-family:'Sora',sans-serif">Complete Your Order</div></div>
      <button class="mcls" onclick="set({modal:null})">×</button>
    </div>
    <div class="steps">
      <div class="step${S.planStep===1?" active":""}${S.planStep>1?" done":""}"><span class="stepn">${S.planStep>1?"✓":"1"}</span>Your Details</div>
      <div class="step${S.planStep===2?" active":""}"><span class="stepn">2</span>Payment</div>
    </div>
    ${S.planStep===1?renderPlanStep1(plan):renderPlanStep2(plan)}
  </div></div>`;
}
function renderPlanStep1(plan){
  return`<div>
  <div class="sumbox" style="margin-bottom:13px">
    <div class="sr"><span>Plan</span><span>${plan.name}</span></div>
    <div class="sr"><span>Growth</span><span>${plan.desc}</span></div>
    <div class="sr"><span>Billing</span><span>Monthly</span></div>
    <div class="sr total"><span>Total today</span><span>$${plan.price} USD</span></div>
  </div>
  <div class="fl"><label>Instagram Username *</label>
    <input id="planIg" type="text" placeholder="your_username  (no @, must be public)" value="${S.planIg}" class="${S.planIgErr?"ferr":""}">
    ${S.planIgErr?`<div style="font-size:11px;color:#dc2626;margin-top:3px">${S.planIgErr}</div>`:""}
    <div style="font-size:10px;color:var(--subtle);margin-top:3px">Your account must be set to public to receive followers.</div>
  </div>
  <div class="fl"><label>Email for receipt (optional)</label><input id="planEmail" type="email" placeholder="you@email.com" value="${S.planEmail}"></div>
  <button class="ctabtn" onclick="validatePlanStep1()">Continue → Choose Payment</button>
</div>`;
}
function validatePlanStep1(){
  const ig=(document.getElementById("planIg")?.value||"").trim().replace(/^@/,"");
  const email=document.getElementById("planEmail")?.value||"";
  if(!ig){set({planIgErr:"Instagram username is required."});return;}
  if(!/^[a-zA-Z0-9_.]{1,30}$/.test(ig)){set({planIgErr:"Invalid format."});return;}
  set({planIg:ig,planEmail:email,planIgErr:"",planStep:2});
}
function renderPlanStep2(plan){
  return`<div>
  <div class="sumbox" style="margin-bottom:13px">
    <div class="sr"><span>Plan</span><span>${plan.name} · $${plan.price}/mo</span></div>
    <div class="sr"><span>Instagram</span><span style="font-weight:700">@${S.planIg}</span></div>
    <div class="sr total"><span>Charge today</span><span>$${plan.price} USD</span></div>
  </div>
  <div style="font-size:12px;font-weight:700;margin-bottom:8px">Payment Method</div>
  <div class="pmethods">
    <div class="popt${S.planPay==="stripe"?" sel":""}" onclick="set({planPay:'stripe'})">
      <div class="plgo">💳</div><div class="pnm">Card Payment</div>
      <div class="pcards"><span class="pcb visa">VISA</span><span class="pcb mc">MC</span><span class="pcb amex">AMEX</span></div>
      <div class="psub" style="color:#15803d;margin-top:4px">Visa · Mastercard · Amex</div>
    </div>
    <div class="popt${S.planPay==="paypal"?" sel":""}" onclick="set({planPay:'paypal'})">
      <div class="plgo">🅿️</div><div class="pnm">PayPal</div>
      <div class="pcards"><span class="pcb visa">VISA</span><span class="pcb mc">MC</span><span class="pcb pp">PP</span></div>
      <div class="psub" style="color:#15803d;margin-top:4px">Secure — PayPal</div>
    </div>
  </div>
  <div class="tip">🔒 You'll be taken to ${S.planPay==="stripe"?"Stripe's secure card form":"PayPal's checkout"} to complete payment.</div>
  ${S.planLoading
    ?`<button class="ctabtn" disabled><div class="spin"></div>Redirecting to checkout...</button>`
    :`<button class="ctabtn" onclick="submitPlanOrder()">
      ${S.planPay==="stripe"?`Pay $${plan.price} securely →`:`Pay Securely →`}
    </button>`}
  <button class="ctabtn ghost" onclick="set({planStep:1})" style="margin-top:8px">← Back</button>
</div>`;
}
async function submitPlanOrder(){
  const plan=S.selPlan;
  set({planLoading:true});
  try {
    const res = await fetch('/api/create-checkout', {
      method:  "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        type:              "plan",
        planId:            plan.id,
        instagramUsername: S.planIg,
        email:             S.planEmail||undefined,
      }),
    });
    const data = await res.json();
    if(data.url){
      window.location.href = data.url;
    } else {
      alert("Error: " + (data.error||"Could not create checkout session."));
      set({planLoading:false});
    }
  } catch(err) {
    alert("Cannot reach backend server. Is it running?");
    set({planLoading:false});
  }
}

// ─── TOPUP MODAL ──────────────────────────────────────────────────────────────
function renderTopupModal(){
  return`<div class="overlay" onclick="if(event.target===this)set({modal:null})">
  <div class="modal">
    <div class="mh"><div style="font-size:17px;font-weight:800;font-family:'Sora',sans-serif">Top Up Credits</div><button class="mcls" onclick="set({modal:null})">×</button></div>
    <div class="tgrid">
      ${TOPUP.map(a=>`<button class="tamtbtn${S.topupAmt===a?" sel":""}" onclick="set({topupAmt:${a}})">
        <div class="tamtval">$${a}</div><div style="font-size:10px;color:var(--subtle);margin-top:2px">$${a} credits</div>
      </button>`).join("")}
    </div>
    <div class="tip">💡 This opens Stripe Checkout — you pay, credits are added automatically.</div>
    <button class="ctabtn" onclick="set({modal:null})">Add $${S.topupAmt} via Stripe →</button>
  </div></div>`;
}

// ─── ORDERS ───────────────────────────────────────────────────────────────────
function orow(o){
  const icon=ICONS[String(o.quantity)]||"📦";
  return`<div class="orow">
  <div style="display:flex;align-items:center;gap:9px">
    <div class="oicon">${icon}</div>
    <div><div style="font-weight:600;font-size:13px">${o.package_name}</div>
    <div style="font-size:10px;color:var(--subtle);margin-top:1px">${fmtDate(o.created_at)} · Ref: ${o.id}</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:9px">
    <span class="badge ${o.status}">${o.status}</span>
    <span style="font-weight:700;font-size:13px">${fmt(o.amount_paid)}</span>
  </div></div>`;
}
function renderOrders(){
  return`<div class="fade-in">
  <div class="ptitle">Order History</div>
  <div class="psub">All your GramLift orders.</div>
  <div class="olist">
    ${S.orders.map(orow).join("")}
    ${S.orders.length===0?`<div style="text-align:center;padding:60px;color:var(--subtle)">No orders yet</div>`:""}
  </div></div>`;
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function renderSettings(){
  const u=S.user||MOCK_USER;
  return`<div class="fade-in">
  <div class="ptitle">Account Settings</div><div class="psub">Manage your profile.</div>
  <div class="setcard"><h3>Profile</h3>
    <div class="fl"><label>Email</label><input type="email" value="${u.email}" disabled style="background:#f9fafb;color:var(--muted)"></div>
    <div class="fl"><label>Instagram Username</label><input type="text" id="settingsHandle" placeholder="your_username" value="${u.instagram_handle||""}"></div>
    <div class="fl"><label>Full Name</label><input type="text" placeholder="Your name"></div>
    <button class="savebtn" onclick="saveSettings()">Save Changes</button>
    ${S.settingsSaved?`<span style="margin-left:10px;color:#15803d;font-size:12px">✓ Saved!</span>`:""}
  </div>
  <div class="setcard"><h3>Backend Status</h3>
    <button onclick="checkHealth()" style="padding:8px 16px;background:var(--grad);border:none;border-radius:9px;color:white;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px">Check Server Status</button>
    <div id="healthResult" style="margin-top:10px;font-size:12px;color:var(--muted)"></div>
  </div></div>`;
}
function saveSettings(){
  const h=document.getElementById("settingsHandle")?.value||"";
  set({user:S.user?{...S.user,instagram_handle:h}:S.user,settingsSaved:true});
  setTimeout(()=>set({settingsSaved:false}),2500);
}
async function checkHealth(){
  document.getElementById("healthResult").innerHTML="Checking...";
  try {
    const r=await fetch(`${API_BASE}/api/health`);
    const d=await r.json();
    document.getElementById("healthResult").innerHTML=`✅ Server online · Mode: <strong>${d.mode}</strong>`;
  } catch {
    document.getElementById("healthResult").innerHTML=`❌ Cannot reach server at ${API_BASE} — is it running?`;
  }
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function renderLogin(){
  return`<div class="lwrap">
  <nav class="lnav"><div class="logo"><span>GramLift</span></div></nav>
  <div class="lctr"><div class="lcard">
    <div class="tabs">
      <button class="ltab${S.ltab==="login"?" active":""}" onclick="set({ltab:'login'})">Log In</button>
      <button class="ltab${S.ltab==="signup"?" active":""}" onclick="set({ltab:'signup'})">Create Account</button>
    </div>
    <div class="fl"><label>Email</label><input id="em" type="email" placeholder="you@example.com"></div>
    <div class="fl"><label>Password</label><input id="pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="subbtn" onclick="doLogin()">${S.ltab==="login"?"Log In →":"Create Account →"}</button>
    <div style="text-align:center;font-size:11px;color:var(--subtle);margin-bottom:10px">or</div>
    <button class="gbtn" onclick="set({page:'app',user:MOCK_USER})">🔵 Continue with Google</button>
    <p style="text-align:center;font-size:10px;color:var(--subtle);margin-top:12px">By continuing you agree to our Terms & Privacy Policy</p>
  </div></div></div>`;
}
function doLogin(){
  const em=document.getElementById("em")?.value||"";
  const pw=document.getElementById("pw")?.value||"";
  if(!em||!pw){alert("Please fill in all fields.");return;}
  set({page:"app",user:{...MOCK_USER,email:em}});
}

render();
</script>
</body>
</html>
